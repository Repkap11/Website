# Forward all HTTP trafic to HTTPS
server {
    listen *:80;
    listen [::]:80;
    server_name _;

    location / {
        return 301 https://$host$request_uri;
    }
}

# Forward any other wildcard subdomains to www
server {
    listen *:443 ssl;
    listen [::]:443 ssl;
    server_name *.repkap11.com;

    return 301 $scheme://www.repkap11.com$request_uri;
}
