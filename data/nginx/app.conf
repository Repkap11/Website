include /etc/letsencrypt/options-ssl-nginx.conf;
ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    root /home/paul/website;
    index index.html;
    server_name repkap11 www.repkap11.com repkap11.com;
    location / {
        try_files $uri $uri/ =404;
    }
    ssl_certificate /etc/letsencrypt/live/repkap11.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/repkap11.com/privkey.pem;
    location /files {
        try_files $uri $uri/ =404;
	    autoindex on;
    }
    location /files/tsc {
	    autoindex on;
        try_files $uri $uri/ =404;
        auth_basic "TSC Files";
        auth_basic_user_file /etc/apache2/.htpasswd;
    }
    location /files/repcast {
	    autoindex on;
        try_files $uri $uri/ =404;
        auth_basic "RepCast Files";
        auth_basic_user_file /etc/apache2/.htpasswd;
    }

}

# Forward "nas" to "paul-nas" DMS (5000) on the tailnet.
server {
    listen 100.110.183.4:443 ssl; # Tailscale only
    listen [fd7a:115c:a1e0:ab12:4843:cd96:626e:b704]:443 ssl; # Tailscale only
    server_name nas.repkap11.com;

    ssl_certificate /etc/letsencrypt/live/repkap11.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/repkap11.com/privkey.pem;

    location / {
        proxy_pass https://paul-nas.tailbf26b.ts.net:5001;

        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

