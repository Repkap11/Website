include /etc/letsencrypt/options-ssl-nginx.conf;
ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    root /home/paul/website;
    index index.html;
    server_name repkap11 www.repkap11.com repkap11.com;
    location / {
        try_files $uri $uri/ =404;
    }
    ssl_certificate /etc/letsencrypt/live/repkap11.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/repkap11.com-0001/privkey.pem;
    location /files {
        try_files $uri $uri/ =404;
	    autoindex on;
    }
    location /files/tsc {
	    autoindex on;
        try_files $uri $uri/ =404;
        auth_basic "TSC Files";
        auth_basic_user_file /etc/apache2/.htpasswd;
    }
    location /files/repcast {
	    autoindex on;
        try_files $uri $uri/ =404;
        auth_basic "RepCast Files";
        auth_basic_user_file /etc/apache2/.htpasswd;
    }

    location /.well-known/acme-challenge {
        root /var/www/certbot;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    location /.well-known/acme-challenge {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name nas.repkap11.com;

    ssl_certificate /etc/letsencrypt/live/repkap11.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/repkap11.com-0001/privkey.pem;
    
    location /.well-known/acme-challenge {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://paul-nas.tailbf26b.ts.net:5000;

        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name home.repkap11.com;

    ssl_certificate /etc/letsencrypt/live/repkap11.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/repkap11.com-0001/privkey.pem;
    
    location /.well-known/acme-challenge {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://paul-nas.tailbf26b.ts.net:8123;
                
        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}